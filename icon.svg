<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Fondo negro con esquinas redondeadas -->
  <rect width="512" height="512" fill="#0A0A0A" rx="88"/>

  <!-- Anillo circular del badge -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#D4F000" stroke-width="5"/>

  <!-- ── TEXTO MIS (pegado encima de la mancuerna) ── -->
  <text x="256" y="178"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="900" font-size="84" fill="#F8F8F8"
    text-anchor="middle" letter-spacing="16">MIS</text>

  <!-- ── MANCUERNA (centrada en y=258) ── -->

  <!-- Disco pequeño izquierdo -->
  <rect x="54"  y="212" width="28" height="88" rx="7"  fill="#D4F000"/>
  <!-- Disco grande izquierdo -->
  <rect x="82"  y="190" width="38" height="136" rx="10" fill="#D4F000"/>
  <!-- Collar izquierdo -->
  <rect x="120" y="238" width="18" height="40" rx="4"  fill="#C8E200"/>
  <!-- Barra central -->
  <rect x="138" y="244" width="236" height="24" rx="6"  fill="#D4F000"/>
  <!-- Collar derecho -->
  <rect x="374" y="238" width="18" height="40" rx="4"  fill="#C8E200"/>
  <!-- Disco grande derecho -->
  <rect x="392" y="190" width="38" height="136" rx="10" fill="#D4F000"/>
  <!-- Disco pequeño derecho -->
  <rect x="430" y="212" width="28" height="88" rx="7"  fill="#D4F000"/>

  <!-- ── TEXTO RUTINAS (pegado debajo de la mancuerna) ── -->
  <text x="256" y="374"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="900" font-size="52" fill="#F8F8F8"
    text-anchor="middle" letter-spacing="8">RUTINAS</text>

</svg>
